name: CI - PR 체크

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  test:
    name: 백엔드 테스트
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: 의존성 설치
        run: pip install -r backend/requirements.txt

      - name: 임포트 확인
        env:
          GEMINI_API_KEY: dummy-key-for-ci
        run: python -c "from backend.main import app; print('임포트 성공')"

  build:
    name: Docker 빌드 확인
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Docker 이미지 빌드 테스트
        run: docker build -t reverse-plan-generator:test .
